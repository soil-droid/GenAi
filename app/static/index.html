<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex AI Agents</title>
    <style>
        :root {
            --bg-base: #0f1115;
            --bg-surface: #1a1d24;
            --bg-surface-hover: #232730;
            --bg-bubble-user: #2d3139;
            --text-primary: #f0f0f0;
            --text-secondary: #9ca3af;
            --accent: #6d28d9;
            --accent-glow: rgba(109, 40, 217, 0.4);
            --border: #374151;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-base);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #6d28d9, #4f46e5);
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .new-chat-btn:hover {
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-1px);
        }

        .history-list {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
        }

        .history-item {
            padding: 0.75rem;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background-color: var(--bg-surface);
            color: var(--text-primary);
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-surface);
            position: relative;
        }

        .header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(26, 29, 36, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-avatar { background-color: var(--bg-bubble-user); }
        .ai-avatar { 
            background: linear-gradient(135deg, #6d28d9, #4f46e5);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .message-content {
            background-color: transparent;
            line-height: 1.6;
            color: #d1d5db;
        }

        .user-message .message-content {
            background-color: var(--bg-bubble-user);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border-top-right-radius: 4px;
        }
        
        .user-message { justify-content: flex-end; }
        .user-message .avatar { display: none; } /* Hide user avatar for iOS style */

        /* Input Area */
        .input-container {
            padding: 2rem;
            background: linear-gradient(to top, var(--bg-surface) 80%, transparent);
            position: relative;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            padding: 0.5rem 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: border-color 0.3s ease;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 10px 25px rgba(0,0,0,0.3);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 0.75rem 0;
            resize: none;
            outline: none;
            max-height: 150px;
            min-height: 24px;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        .send-btn:hover {
            background-color: #5b21b6;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: none;
            gap: 4px;
            padding: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Syntax highlighting simple mimic */
        pre {
            background-color: #0d0f13;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 0.5rem;
            border: 1px solid var(--border);
        }
        
        code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        .trace-card {
            background-color: rgba(109, 40, 217, 0.05);
            border: 1px solid rgba(109, 40, 217, 0.2);
            border-radius: 8px;
            padding: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="new-chat-btn" onclick="clearChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Session
        </button>
        <div class="history-list" id="history">
            <!-- Dynamic history items -->
            <div class="history-item">Current Session</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Productivity Agent Network</h1>
            <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                <span style="display:inline-block; width:8px; height:8px; background:#10b981; border-radius:50%; box-shadow: 0 0 8px #10b981;"></span>
                Vertex AI Connected
            </div>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="message">
                <div class="avatar ai-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div class="message-content">
                    Hello! I'm your Multi-Agent Productivity Assistant. I can orchestrate notes, split tasks, and book your calendar all at once. What are we working on today?
                </div>
            </div>
            <!-- More messages inject here -->
        </div>

        <div class="input-container">
            <div class="typing-indicator" id="typingIndicator">
                <div class="avatar ai-avatar" style="width:24px; height:24px; margin-right: 1rem;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                <div style="display:flex; align-items:center; gap:4px">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <span style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 0.5rem;">Agents are orchestrating...</span>
            </div>

            <div class="input-box">
                <textarea id="promptInput" rows="1" placeholder="Ex: I closed a deal. Draft a brief and add a task to send an invoice..." oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // Generate a random session ID for this browser tab
        const sessionId = "sess_" + Math.random().toString(36).substring(2, 9);
        const userId = "guest-user"; 
        
        const chatContainer = document.getElementById('chatContainer');
        const inputField = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Handle Enter key (but allow Shift+Enter for newlines)
        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            if (textarea.value === '') {
                textarea.style.height = 'auto';
            }
        }

        function clearChat() {
            // Keep the first welcome message
            while (chatContainer.children.length > 1) {
                chatContainer.removeChild(chatContainer.lastChild);
            }
            inputField.value = '';
            autoResize(inputField);
        }

        function appendMessage(role, content, traceData = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-message' : ''}`;
            
            let avatarHtml = '';
            if (role === 'ai') {
                avatarHtml = `<div class="avatar ai-avatar">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                              </div>`;
            } else {
                avatarHtml = `<div class="avatar user-avatar">U</div>`;
            }

            // Convert simple markdown/newlines to HTML
            let formattedContent = content.replace(/\n/g, '<br>');
            formattedContent = formattedContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            let traceHtml = '';
            if (traceData && traceData.length > 0) {
                const agents = [...new Set(traceData.map(node => node.node))].filter(n => n !== 'Supervisor');
                if (agents.length > 0) {
                    traceHtml = `
                    <div class="trace-card">
                        <strong>Agents Used:</strong> 
                        ${agents.map(a => `<span style="background: rgba(109, 40, 217, 0.2); border-radius: 4px; padding: 2px 6px; margin-right: 4px;">${a}</span>`).join('')}
                    </div>`;
                }
            }

            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-content" style="${role === 'user' ? '' : 'width: 100%'}">
                    ${formattedContent}
                    ${traceHtml}
                </div>
            `;
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Show user message
            appendMessage('user', text);
            inputField.value = '';
            autoResize(inputField);
            
            // 2. Disable input & show loading
            inputField.disabled = true;
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 3. Make API call
                const response = await fetch('/api/v1/agent/invoke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        session_id: sessionId,
                        prompt: text
                    })
                });

                const data = await response.json();

                if (!response.ok || data.status === 'error') {
                    appendMessage('ai', `⚠️ Error: ${data.detail || data.final_reply || 'The backend failed to process the request.'}`);
                } else {
                    // Success
                    appendMessage('ai', data.final_reply, data.execution_trace);
                }
            } catch (err) {
                appendMessage('ai', `⚠️ Network Error: Could not connect to the backend server. Are you sure it's running?`);
            } finally {
                // 4. Reset UI
                typingIndicator.style.display = 'none';
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
    </script>
</body>
</html>
